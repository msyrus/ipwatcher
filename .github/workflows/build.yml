name: Build and Test

on:
  push:
    branches: [ main ]

# Required secrets for integration tests:
# Cloudflare:
#   - CLOUDFLARE_API_TOKEN: Your Cloudflare API token
#   - CLOUDFLARE_TEST_ZONE_ID: Zone ID for testing (e.g., abc123...)
#   - CLOUDFLARE_TEST_ZONE_NAME: Zone name for testing (e.g., example.com)
# Route53:
#   - ROUTE53_TEST_ZONE_NAME: Zone name for testing (e.g., example.com)
#   - AWS_ACCESS_KEY_ID: AWS access key for Route53 testing
#   - AWS_SECRET_ACCESS_KEY: AWS secret key for Route53 testing
#   - AWS_REGION: AWS region for Route53 testing

jobs:
  version:
    name: Tag Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      next_version: ${{ steps.tag_bump.outputs.tag }}
      release_tag: ${{ steps.tag_bump.outputs.new_tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Bump version and push tag
      id: tag_bump
      uses: anothrNick/github-tag-action@1.75.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_PREFIX: v
        DEFAULT_BUMP: none
        DEFAULT_BRANCH: main
        RELEASE_BRANCHES: main
        BRANCH_HISTORY: last
        MAJOR_STRING_TOKEN: '#major'
        MINOR_STRING_TOKEN: '#minor'
        PATCH_STRING_TOKEN: '#patch'
        NONE_STRING_TOKEN: '#none'
        VERBOSE: false

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run go vet
      run: go vet ./...

    - name: Run unit tests
      run: make test

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.txt

  integration-test-cloudflare:
    name: Integration Tests (Cloudflare)
    runs-on: ubuntu-latest
    # Only run integration tests if secrets are available (not on forks)
    if: ${{ github.event_name == 'push' && github.repository == 'msyrus/ipwatcher' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run Cloudflare integration tests
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_TEST_ZONE_ID: ${{ secrets.CLOUDFLARE_TEST_ZONE_ID }}
        CLOUDFLARE_TEST_ZONE_NAME: ${{ secrets.CLOUDFLARE_TEST_ZONE_NAME }}
      if: ${{ env.CLOUDFLARE_API_TOKEN && env.CLOUDFLARE_TEST_ZONE_ID && env.CLOUDFLARE_TEST_ZONE_NAME }}
      run: make test-integration-cloudflare

  integration-test-route53:
    name: Integration Tests (Route53)
    runs-on: ubuntu-latest
    # Only run integration tests if secrets are available (not on forks)
    if: ${{ github.event_name == 'push' && github.repository == 'msyrus/ipwatcher' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run Route53 integration tests
      env:
        ROUTE53_TEST_ZONE_NAME: ${{ secrets.ROUTE53_TEST_ZONE_NAME }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      if: ${{ env.ROUTE53_TEST_ZONE_NAME && env.AWS_ACCESS_KEY_ID && env.AWS_SECRET_ACCESS_KEY && env.AWS_REGION }}
      run: make test-integration-route53

  build:
    name: Build
    runs-on: ${{ matrix.runner }}
    needs: [version, unit-test, integration-test-cloudflare, integration-test-route53]
    # Allow build to proceed even if integration tests are skipped
    if: |
      always() &&
      needs.unit-test.result == 'success' &&
      (needs.integration-test-cloudflare.result == 'success' || needs.integration-test-cloudflare.result == 'skipped') &&
      (needs.integration-test-route53.result == 'success' || needs.integration-test-route53.result == 'skipped')

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-26-intel
          - goos: darwin
            goarch: arm64
            runner: macos-26

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        VERSION: ${{ needs.version.outputs.next_version }}
      run: |
        go build -ldflags "-X main.version=${VERSION}" -o ipwatcher-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ipwatcher

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ipwatcher-${{ matrix.goos }}-${{ matrix.goarch }}
        path: ipwatcher-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [version, unit-test, integration-test-cloudflare, integration-test-route53]
    # Allow Docker build to proceed even if integration tests are skipped
    if: |
      always() &&
      needs.unit-test.result == 'success' &&
      (needs.integration-test-cloudflare.result == 'success' || needs.integration-test-cloudflare.result == 'skipped') &&
      (needs.integration-test-route53.result == 'success' || needs.integration-test-route53.result == 'skipped')

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Prepare Docker tags
      id: docker_tags
      env:
        RELEASE_TAG: ${{ needs.version.outputs.release_tag }}
      run: |
        TAGS="msyrus/ipwatcher:latest"
        if [ -n "$RELEASE_TAG" ]; then
          TAGS="$TAGS,msyrus/ipwatcher:$RELEASE_TAG"
        fi
        echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.docker_tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Test Docker image
      run: |
        docker images msyrus/ipwatcher

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: write
    if: needs.version.outputs.release_tag != ''

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: ./artifacts
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.version.outputs.release_tag }}
        name: Release ${{ needs.version.outputs.release_tag }}
        generate_release_notes: true
        files: ./artifacts/*
